<div class="shopping-list-container">
  <ng-container *ngIf="listHelper.shoppingList">
    <form>
      <mat-form-field class="name-form-field">
        <input
          matInput
          maxlength="50"
          class="name-input"
          name="list-name"
          [(ngModel)]="listHelper.shoppingList.name"/>
      </mat-form-field>
      <div class="list-action-buttons">
        <button mat-icon-button (click)="addItem()">
          <mat-icon>add</mat-icon>
        </button>
        <button mat-icon-button [matMenuTriggerFor]="moreOptions">
          <mat-icon>more_vert</mat-icon>
        </button>
        <button
          mat-raised-button
          color="primary"
          [disabled]="!listHelper.canSave()"
          (click)="save()">
          Save
        </button>
      </div>
      <mat-menu #moreOptions="matMenu">
        <button mat-menu-item [matMenuTriggerFor]="sortOptions">Sort By</button>
        <button mat-menu-item (click)="clearAllDoneItems()">Clear All Done Items</button>
        <button mat-menu-item (click)="clearAllItems()">Clear All Items</button>
        <button mat-menu-item (click)="deleteList()">Delete List</button>
      </mat-menu>
      <mat-menu #sortOptions="matMenu">
        <button mat-menu-item routerLink="./all">
          Custom Order
        </button>
        <button mat-menu-item routerLink="./recipes">
          Recipes
        </button>
        <button mat-menu-item routerLink="./categories">
          Categories
        </button>
      </mat-menu>
      <router-outlet></router-outlet>
    </form>
  </ng-container>
</div>
