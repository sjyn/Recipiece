<ng-container *ngIf="($sortedRecipeMap | async) as sortedRecipes">
  <ng-container *ngFor="let sortedRecipeId of getKeys(sortedRecipes)">
    <mat-expansion-panel expanded="{{ true }}" class="expansion-panel">
      <mat-expansion-panel-header>
        <mat-panel-title>
          <ng-container *ngIf="sortedRecipeId !== UNCAT_KEY">
            {{ getRecipeForKey(sortedRecipeId).name }}
          </ng-container>
          <ng-container *ngIf="sortedRecipeId === UNCAT_KEY">
            Uncategorized
          </ng-container>
        </mat-panel-title>
      </mat-expansion-panel-header>
      <app-items-table
        [columns]="columns"
        [dataSource]="sortedRecipes[sortedRecipeId]"
        (dataSourceChange)="dataSourceChanged($event)"
        [reorderable]="false">
      </app-items-table>
    </mat-expansion-panel>
  </ng-container>
</ng-container>
