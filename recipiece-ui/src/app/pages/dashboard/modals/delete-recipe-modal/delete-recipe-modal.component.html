<h1>Delete {{recipe.name}}?</h1>
<p>
  Are you sure you want to delete this recipe?
  You cannot undo this action, and other recipes using this recipe will be unable to load it.
</p>
<div class="button-container">
  <button mat-stroked-button (click)="goBack()" color="primary">Go Back</button>
  <button mat-stroked-button (click)="deleteRecipe()" color="warn">Delete It</button>
</div>
