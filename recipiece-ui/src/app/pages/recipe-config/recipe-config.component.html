<div class="config-container">
  <h1>Create a Recipe</h1>
  <mat-tab-group animationDuration="0ms">
    <mat-tab label="Basics">
      <ng-container *ngIf="!loading">
        <app-config-recipe-basics [recipe]="recipe"></app-config-recipe-basics>
      </ng-container>
    </mat-tab>
    <mat-tab label="Ingredients">
      <app-config-recipe-ingredients></app-config-recipe-ingredients>
    </mat-tab>
    <mat-tab label="Steps">
      <app-config-recipe-steps></app-config-recipe-steps>
    </mat-tab>
  </mat-tab-group>
</div>
